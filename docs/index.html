<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scalper Desk</title>
<style>
  :root{
    --bg:#0B0F14; --panel:#121820; --panel2:#0E141B; --line:#1E2833;
    --text:#D7E1EA; --dim:#7C8B9A; --up:#35C9A3; --down:#F2695C;
    --ai:#8B7CF6; --amber:#E8B04B;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:14px;padding:16px}
  .wrap{max-width:960px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .h{font-size:11px;letter-spacing:1.4px;color:var(--dim);text-transform:uppercase;margin-bottom:10px}
  .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;
    font-size:12px;padding:6px 0;border-bottom:1px solid var(--line)}
  .dim{color:var(--dim)} .up{color:var(--up)} .down{color:var(--down)}
  .ai{color:var(--ai)} .amber{color:var(--amber)}
  .pill{border:1px solid var(--ai);color:var(--ai);border-radius:999px;padding:2px 10px;font-size:11px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
  .statline{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--dim);margin-top:8px}
  .dot{width:8px;height:8px;border-radius:99px;display:inline-block;margin-right:8px}
  .ledger{border-left:2px solid var(--ai);padding-left:10px;margin-bottom:10px;font-size:12px}
  .params{font-size:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(118px,1fr));gap:4px}
  .scroll{max-height:280px;overflow-y:auto}
  h1{font-size:28px;margin:2px 0} b{font-weight:700}
  #eq-svg{width:100%;height:180px;display:block}
  footer{font-size:11px;color:var(--dim);text-align:center;padding-bottom:8px}
  @media(prefers-reduced-motion:no-preference){.dot.live{animation:pulse 2s infinite}
    @keyframes pulse{50%{opacity:.4}}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="card">Loading account…</div>
</div>
<script>
const $ = (h)=>{const d=document.createElement('div');d.innerHTML=h;return d.firstElementChild;};
const fmt$=(v,d=2)=>v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtPx=(v)=>v==null?'—':Number(v).toLocaleString('en-US',{minimumFractionDigits:v<10?4:2,maximumFractionDigits:v<10?4:2});
const fmtT=(t)=>new Date(t).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
const pct=(v)=>`${v>=0?'+':''}${v.toFixed(2)}%`;
const esc=(s)=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function eqSVG(hist,start){
  if(!hist||hist.length<2)return '<div class="dim">Collecting equity history…</div>';
  const W=900,H=180,P=6;
  const xs=hist.map(p=>p[0]),ys=hist.map(p=>p[1]);
  const x0=Math.min(...xs),x1=Math.max(...xs);
  const y0=Math.min(...ys,start),y1=Math.max(...ys,start);
  const sx=t=>P+(W-2*P)*(t-x0)/Math.max(1,x1-x0);
  const sy=v=>H-P-(H-2*P)*(v-y0)/Math.max(0.01,y1-y0);
  const pts=hist.map(p=>`${sx(p[0]).toFixed(1)},${sy(p[1]).toFixed(1)}`).join(' ');
  const col=ys[ys.length-1]>=start?'var(--up)':'var(--down)';
  return `<svg id="eq-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img" aria-label="Equity curve">
    <line x1="0" x2="${W}" y1="${sy(start)}" y2="${sy(start)}" stroke="var(--line)" stroke-dasharray="4 4"/>
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2"/></svg>`;
}

function render(d){
  const app=document.getElementById('app');
  const ageMin=Math.round((Date.now()-d.updated_at)/60000);
  const stale=ageMin>15;
  const status=stale?`STALE — last run ${ageMin}m ago`:(d.halted?'LIVE · HALTED (daily limit)':'LIVE');
  const dotCol=stale?'var(--amber)':(d.feed_ok?'var(--up)':'var(--down)');
  const dayPnl=d.equity-(d.day_anchor?.eq??d.start_balance);
  const roi=((d.equity/d.start_balance)-1)*100;
  const s=d.stats||{};
  const strat=d.strategy;

  const tickers=Object.entries(d.price||{}).map(([m,p])=>`
    <div class="card" style="padding:10px">
      <div class="dim" style="font-size:11px">${m}</div>
      <div style="font-size:18px;font-weight:700">${p?fmtPx(p):'—'}</div>
      <div style="font-size:11px">${strat&&strat.markets.includes(m)?'<span class="pill">traded</span>':'<span class="dim">watch</span>'}</div>
    </div>`).join('');

  const ledger=(d.history||[]).map(h=>`
    <div class="ledger">
      <div><b class="ai">v${h.version}</b> · ${fmtT(h.t)} — ${esc(h.analysis)}</div>
      ${h.mistakes&&h.mistakes.length?`<div class="down" style="font-size:11px">mistakes: ${h.mistakes.map(esc).join(' · ')}</div>`:''}
      ${h.changes&&h.changes.length?`<div class="up" style="font-size:11px">changes: ${h.changes.map(esc).join(' · ')}</div>`:''}
      ${h.tournament&&h.tournament.length?`<div class="ai" style="font-size:11px">tournament: ${h.tournament.map(c=>`${esc(c.name)} [${c.tf}] ${c.net>=0?'+':''}$${fmt$(c.net)}/${c.trades}t${c.winner?' ✓':''}`).join(' · ')}</div>`:''}
    </div>`).join('');

  const positions=(d.positions||[]).map(p=>{
    const px=d.price[p.market]??p.entry;
    const u=(p.side==='long'?px-p.entry:p.entry-px)*p.units;
    return `<div class="row">
      <span><b class="${p.side==='long'?'up':'down'}">${p.side.toUpperCase()}</b> ${p.market} @ ${fmt$(p.entry)} <span class="dim">(${fmtT(p.t_in)})</span></span>
      <span class="dim">SL ${fmt$(p.sl)} · TP ${fmt$(p.tp)}</span>
      <span class="${u>=0?'up':'down'}">${u>=0?'+':''}$${fmt$(u)}</span></div>`;
  }).join('')||'<div class="dim" style="font-size:13px">Flat. Waiting for a signal on closed 1-minute candles.</div>';

  const journal=(d.trades||[]).map(t=>`
    <div class="row">
      <span>${fmtT(t.t_out)} <b class="${t.side==='long'?'up':'down'}">${t.side.toUpperCase()}</b> ${t.market}</span>
      <span class="dim">${fmt$(t.entry)} → ${fmt$(t.exit)} · ${esc(t.exit_reason)} · ${t.held_min}m · v${t.strategy_version}</span>
      <span class="${t.pnl>=0?'up':'down'}" style="font-weight:700">${t.pnl>=0?'+':''}$${fmt$(t.pnl)}</span></div>`
  ).join('')||'<div class="dim" style="font-size:13px">No closed trades yet.</div>';

  const logs=(d.log||[]).map(l=>`
    <div style="padding:3px 0" class="${{ai:'ai',win:'up',loss:'down',warn:'amber'}[l.kind]||'dim'}">
      <span style="opacity:.6">${fmtT(l.t)}</span> ${esc(l.msg)}</div>`).join('');

  app.innerHTML=`
    <div class="card" style="display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between">
      <div>
        <div class="ai" style="font-size:11px;letter-spacing:2px">
          <span class="dot ${stale?'':'live'}" style="background:${dotCol};box-shadow:0 0 8px ${dotCol}"></span>
          SCALPER DESK · BTC/ETH/XAU · ${status}
        </div>
        <h1>$${fmt$(d.equity)} <span style="font-size:13px" class="${d.equity>=d.start_balance?'up':'down'}">${pct(roi)}</span></h1>
        <div class="dim" style="font-size:12px">start $${fmt$(d.start_balance,0)} · today ${dayPnl>=0?'+':''}$${fmt$(dayPnl)} · run by Claude · updated ${ageMin<1?'just now':ageMin+'m ago'}</div>
      </div>
    </div>
    <div class="grid">${tickers}</div>
    <div class="card"><div class="h">Equity curve</div>${eqSVG(d.equity_hist,d.start_balance)}
      <div class="statline">
        <span>trades <b style="color:var(--text)">${s.n??0}</b></span>
        <span>win rate <b style="color:var(--text)">${fmt$(s.win_rate,1)}%</b></span>
        <span>profit factor <b class="${(s.pf??0)>=1?'up':'down'}">${fmt$(s.pf)}</b></span>
        <span>net <b class="${(s.net??0)>=0?'up':'down'}">$${fmt$(s.net)}</b></span>
        <span>next review in <b class="ai">${Math.max(0,(d.review_every??8)-(d.trades_since_review??0))}</b> trades</span>
      </div></div>
    <div class="card"><div class="h">Strategy ledger — written and revised by the bot</div>
      ${strat?`<div style="background:var(--panel2);border:1px solid #8B7CF633;border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><b>v${strat.version} · ${esc(strat.name)}</b><span class="pill">${strat.markets.join(' · ')}</span></div>
        <div class="dim" style="font-size:12px;margin:6px 0">${esc(strat.rationale)}</div>
        <div class="params">
          <span>timeframe <b>${strat.timeframe||'15m'}</b></span>
          <span>risk/trade <b>${strat.risk.riskPerTradePct}%</b></span>
          <span>SL <b>${strat.risk.stopLossPct}%</b> / TP <b>${strat.risk.takeProfitPct}%</b></span>
          <span>trail <b>${strat.risk.trailingStopPct||'off'}${strat.risk.trailingStopPct?'%':''}</b></span>
          <span>max hold <b>${strat.risk.maxHoldMinutes}m</b></span>
          <span>daily halt <b>${strat.risk.maxDailyLossPct}%</b></span>
          <span>cooldown <b>${strat.risk.cooldownMinutes}m</b></span>
        </div></div>`:'<div class="dim">Strategy pending first run.</div>'}
      ${ledger}</div>
    <div class="card"><div class="h">Open positions (${(d.positions||[]).length})</div>${positions}</div>
    <div class="card"><div class="h">Trade journal (${(d.trades||[]).length})</div><div class="scroll">${journal}</div></div>
    <div class="card" style="background:var(--panel2)"><div class="h">Activity</div><div class="scroll" style="max-height:180px;font-size:12px">${logs||'<span class="dim">No activity yet.</span>'}</div></div>
    <footer>Paper account · fully bot-managed · executes every ~5 min via GitHub Actions · signals on closed candles (bot-chosen timeframe) · risk hard-capped ≤2%/trade, ≤3%/day</footer>`;
}

async function load(){
  try{
    const r=await fetch('data.json?ts='+Date.now(),{cache:'no-store'});
    if(!r.ok)throw new Error(r.status);
    render(await r.json());
  }catch(e){
    document.getElementById('app').innerHTML=
      '<div class="card"><b>No data yet.</b><div class="dim" style="margin-top:6px;font-size:12px">The bot hasn\'t completed its first run. Go to the repo → Actions → trading-bot → Run workflow, wait a minute, then refresh this page.</div></div>';
  }
}
load();
setInterval(load,60000);
</script>
</body>
</html>
